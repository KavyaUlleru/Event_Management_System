<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner - Event Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>

<body>
    <nav>
        <div class="container">
            <div class="logo">🎉 Event Manager</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="#" onclick="logout()" class="btn btn-danger btn-sm">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="card mt-4" style="max-width: 800px; margin-left: auto; margin-right: auto;">
            <div class="card-header">
                <h1 class="card-title">QR Code Scanner</h1>
                <p style="color: var(--gray); margin-top: 0.5rem;">Scan participant tickets to mark attendance</p>
            </div>

            <div id="message"></div>

            <div id="reader" style="width: 100%; max-width: 600px; margin: 2rem auto;"></div>

            <div id="scanResult" class="hidden mt-4"></div>

            <div class="text-center mt-4">
                <button id="startBtn" onclick="startScanner()" class="btn btn-primary">Start Scanner</button>
                <button id="stopBtn" onclick="stopScanner()" class="btn btn-danger hidden">Stop Scanner</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        protectPage();

        // Check if user has permission
        if (!hasRole('organizer', 'admin')) {
            alert('You do not have permission to scan QR codes');
            window.location.href = 'dashboard.html';
        }

        let html5QrcodeScanner = null;

        function startScanner() {
            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('stopBtn').classList.remove('hidden');
            document.getElementById('message').innerHTML = '';

            html5QrcodeScanner = new Html5Qrcode("reader");

            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrcodeScanner.start(
                { facingMode: "environment" },
                config,
                onScanSuccess,
                onScanError
            ).catch(err => {
                showError('message', 'Unable to start camera. Please check permissions.');
                document.getElementById('startBtn').classList.remove('hidden');
                document.getElementById('stopBtn').classList.add('hidden');
            });
        }

        function stopScanner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    document.getElementById('startBtn').classList.remove('hidden');
                    document.getElementById('stopBtn').classList.add('hidden');
                });
            }
        }

        async function onScanSuccess(decodedText, decodedResult) {
            // Stop scanner temporarily
            stopScanner();

            try {
                const data = await validateQRCode(decodedText);

                document.getElementById('scanResult').innerHTML = `
          <div class="card" style="background: linear-gradient(135deg, #10b981, #059669); color: white;">
            <div class="text-center">
              <div style="font-size: 4rem; margin-bottom: 1rem;">✅</div>
              <h2>Attendance Marked!</h2>
              <div style="margin-top: 1.5rem; font-size: 1.1rem;">
                <p><strong>Participant:</strong> ${data.participant.name}</p>
                <p><strong>Email:</strong> ${data.participant.email}</p>
                <p><strong>Event:</strong> ${data.event.title}</p>
                <p><strong>Time:</strong> ${formatDateTime(data.attendedAt)}</p>
              </div>
            </div>
          </div>
        `;
                document.getElementById('scanResult').classList.remove('hidden');

                // Play success sound (optional)
                const audio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIGWi78OScTgwOUKXh8LljHAU2jdXzzn0vBSh+zPLaizsKGGS56+mnVhMKRp/g8r5sIQUrgc7y2Yk2CBlou+3nn04MDlCl4fC5YxwFNo3V885+LwUofszy2os7ChhluevsqFYTCkaf4PK+bCEFK4HO8tmJNggZaLvt559ODA5QpeHwuWMcBTaN1fPOfi8FKH7M8tqLOwoYZbnr7KhWEwpGn+DyvmwhBSuBzvLZiTYIGWi77eefTgwOUKXh8LljHAU2jdXzzn4vBSh+zPLaizsKGGW56+yoVhMKRp/g8r5sIQUrgc7y2Yk2CBlou+3nn04MDlCl4fC5YxwFNo3V885+LwUofszy2os7ChhluevsqFYTCkaf4PK+bCEFK4HO8tmJNggZaLvt559ODA5QpeHwuWMcBTaN1fPOfi8FKH7M8tqLOwoYZbnr7KhWEwpGn+DyvmwhBSuBzvLZiTYIGWi77eefTgwOUKXh8LljHAU2jdXzzn4vBSh+zPLaizsKGGW56+yoVhMKRp/g8r5sIQUrgc7y2Yk2CBlou+3nn04MDlCl4fC5YxwFNo3V885+LwUofszy2os7ChhluevsqFYTCkaf4PK+bCEFK4HO8tmJNggZaLvt559ODA5QpeHwuWMcBTaN1fPOfi8FKH7M8tqLOwoYZbnr7KhWEwpGn+DyvmwhBSuBzvLZiTYIGWi77eefTgwOUKXh8LljHAU2jdXzzn4vBSh+zPLaizsKGGW56+yoVhMK');
                audio.play().catch(() => { });

                // Resume scanner after 3 seconds
                setTimeout(() => {
                    document.getElementById('scanResult').classList.add('hidden');
                    startScanner();
                }, 3000);

            } catch (error) {
                document.getElementById('scanResult').innerHTML = `
          <div class="card" style="background: linear-gradient(135deg, #ef4444, #dc2626); color: white;">
            <div class="text-center">
              <div style="font-size: 4rem; margin-bottom: 1rem;">❌</div>
              <h2>Invalid Ticket</h2>
              <p style="margin-top: 1rem; font-size: 1.1rem;">${error.message}</p>
            </div>
          </div>
        `;
                document.getElementById('scanResult').classList.remove('hidden');

                // Resume scanner after 3 seconds
                setTimeout(() => {
                    document.getElementById('scanResult').classList.add('hidden');
                    startScanner();
                }, 3000);
            }
        }

        function onScanError(errorMessage) {
            // Ignore scan errors (they happen frequently during scanning)
        }
    </script>
</body>

</html>
